name: Cortex CLI - Container Image Scan Demo

on:
  workflow_dispatch: 
  push:
    branches: [ main ]

jobs:
  cortex-cwp-scan:
    name: Run Cloud Workload Protection Scan
    runs-on: ubuntu-latest
    environment: cortex cli

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install Cortex CLI
        run: |
          # 1. Activer Homebrew sur le runner Linux de GitHub
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          
          # 2. Installer la CLI Cortex
          brew tap paloaltonetworks/cortexcli
          brew install cortexcli
          
          # 3. Rendre la commande 'cortexcli' disponible pour les étapes suivantes
          echo "$(brew --prefix)/bin" >> $GITHUB_PATH

      - name: Build Local Demo Image
        run: |
          docker build -t my-local-app:latest .

      - name: Run Cortex Image Scan
        env:
          CORTEX_API_BASE_URL: ${{ secrets.CORTEX_API_BASE_URL }}
          CORTEX_API_KEY_ID: ${{ secrets.CORTEX_API_KEY_ID }}
          CORTEX_API_KEY: ${{ secrets.CORTEX_API_KEY }}
        run: |
          echo "Starting CWP Container Image Scan..."
          cortexcli image scan my-local-app:latest --soft-fail
