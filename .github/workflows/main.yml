name: POC - Docker Secure Base Image Scan (Trivy + Cortex)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  scan-docker-image:
    name: Docker Image - Trivy & Cortex Scan
    runs-on: ubuntu-latest
    environment: cortex cli

    steps:
      # 1. Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Login Docker Hub (si image privée)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Pull de l'image
      - name: Pull Docker Image
        run: |
          docker pull lorealdhitest/dhi-python:3-debian-sfw-ent-dev
          docker tag lorealdhitest/dhi-python:3-debian-sfw-ent-dev docker-python:3-debian

      # 4. Scan Trivy
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: docker-python:3-debian
          format: json
          output: trivy-docker-results.json
          severity: CRITICAL,HIGH,MEDIUM,LOW
          exit-code: '0'

      # 5. Résumé Trivy dans les logs
      - name: Display Trivy Summary
        run: |
          echo "=== TRIVY SCAN SUMMARY - DOCKER ==="
          cat trivy-docker-results.json | jq '
            .Results[] |
            {
              Target: .Target,
              Critical: [.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length,
              High: [.Vulnerabilities[]? | select(.Severity=="HIGH")] | length,
              Medium: [.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length,
              Low: [.Vulnerabilities[]? | select(.Severity=="LOW")] | length
            }
          '

      # 6. Upload rapport Trivy
      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-docker-report
          path: trivy-docker-results.json
          retention-days: 30

      # 7. Java 11 requis pour Cortex CLI
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      # 8. Installation Cortex CLI
      - name: Install Cortex CLI
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          export HOMEBREW_NO_REQUIRE_TAP_TRUST=1
          brew tap paloaltonetworks/cortexcli
          brew install cortexcli
          echo "$(brew --prefix)/bin" >> $GITHUB_PATH

      # 9. Scan Cortex
      - name: Run Cortex Image Scan
        env:
          CORTEX_API_BASE_URL: ${{ secrets.CORTEX_API_BASE_URL }}
          CORTEX_API_KEY_ID: ${{ secrets.CORTEX_API_KEY_ID }}
          CORTEX_API_KEY: ${{ secrets.CORTEX_API_KEY }}
        run: |
          echo "=== CORTEX SCAN SUMMARY - DOCKER ==="
          cortexcli image scan docker-python:3-debian --soft-fail 2>&1 | tee cortex-docker-results.txt

      # 10. Upload rapport Cortex
      - name: Upload Cortex Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cortex-docker-report
          path: cortex-docker-results.txt
          if-no-files-found: warn
          retention-days: 30
