name: POC - Rapidfort Secure Base Image Scan (Trivy + Cortex)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  RF_CONTAINER_ENGINE: docker

jobs:
  scan-rapidfort-image:
    name: Rapidfort Image - Trivy & Cortex Scan
    runs-on: ubuntu-latest
    environment: cortex cli

    steps:
      # 1. Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Installation CLI Rapidfort
      - name: Install Rapidfort CLI
        run: |
          curl -sSL https://us01.rapidfort.com/cli | bash
          echo "/home/runner/work/cortex-cli/cortex-cli/rapidfort" >> $GITHUB_PATH

      # 3. Injecter credentials + configurer Docker via rflogin
      - name: Setup Rapidfort Credentials & Login
        run: |
          mkdir -p ~/.rapidfort
          echo "${{ secrets.RAPIDFORT_CREDENTIALS }}" > ~/.rapidfort/credentials
          echo "Credentials file injected ✅"
          rflogin

      # 4. Pull de l'image Rapidfort nginx alpine3.21
      - name: Pull Rapidfort Image
        run: |
          docker pull quay.io/rfcurated/nginx:alpine3.21-rfcurated
          docker tag quay.io/rfcurated/nginx:alpine3.21-rfcurated rapidfort-nginx:alpine3.21
          echo "=== Image vérification ==="
          docker images | grep rapidfort-nginx

      # 5. Scan Trivy
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rapidfort-nginx:alpine3.21
          format: json
          output: trivy-rapidfort-results.json   # ← nom cohérent
          severity: CRITICAL,HIGH,MEDIUM,LOW
          exit-code: '0'

      # 6. Résumé Trivy dans les logs
      - name: Display Trivy Summary
        run: |
          echo "=== TRIVY SCAN SUMMARY - RAPIDFORT nginx ==="
          cat trivy-rapidfort-results.json | jq '
            .Results[] |
            {
              Target: .Target,
              Critical: [.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length,
              High: [.Vulnerabilities[]? | select(.Severity=="HIGH")] | length,
              Medium: [.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length,
              Low: [.Vulnerabilities[]? | select(.Severity=="LOW")] | length
            }
          '

      # 7. Debug Trivy — nom corrigé
      - name: Debug - Verify Trivy Output
        if: always()
        run: |
          echo "=== Fichiers présents ==="
          ls -la
          echo "=== trivy-rapidfort-results.json ==="
          cat trivy-rapidfort-results.json || echo "Fichier inexistant"

      # 8. Upload rapport Trivy
      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-rapidfort-report
          path: trivy-rapidfort-results.json     # ← nom cohérent
          retention-days: 30

      # 9. Java 11 requis pour Cortex CLI
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      # 10. Installation Cortex CLI
      - name: Install Cortex CLI
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          export HOMEBREW_NO_REQUIRE_TAP_TRUST=1
          brew tap paloaltonetworks/cortexcli
          brew install cortexcli
          echo "$(brew --prefix)/bin" >> $GITHUB_PATH

      # 11. Scan Cortex
      - name: Run Cortex Image Scan
        env:
          CORTEX_API_BASE_URL: ${{ secrets.CORTEX_API_BASE_URL }}
          CORTEX_API_KEY_ID: ${{ secrets.CORTEX_API_KEY_ID }}
          CORTEX_API_KEY: ${{ secrets.CORTEX_API_KEY }}
        run: |
          echo "=== CORTEX SCAN SUMMARY - RAPIDFORT nginx ==="
          cortexcli image scan rapidfort-nginx:alpine3.21 --soft-fail 2>&1 | tee cortex-rapidfort-results.txt

      # 12. Debug Cortex — noms corrigés
      - name: Debug - Verify Cortex Output
        if: always()
        run: |
          echo "=== Taille du fichier ==="
          wc -l cortex-rapidfort-results.txt     # ← nom corrigé
          echo "=== Contenu ==="
          cat cortex-rapidfort-results.txt       # ← nom corrigé

      # 13. Upload rapport Cortex
      - name: Upload Cortex Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cortex-rapidfort-report
          path: cortex-rapidfort-results.txt     # ← nom cohérent
          if-no-files-found: warn
          retention-days: 30
