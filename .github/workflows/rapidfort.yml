name: POC - Rapidfort Secure Base Image Scan (Trivy + Cortex)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  scan-rapidfort-image:
    name: Rapidfort Image - Trivy & Cortex Scan
    runs-on: ubuntu-latest
    environment: cortex cli

    steps:
      # 1. Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Login au registry Rapidfort
      - name: Login to Rapidfort Registry
        uses: docker/login-action@v3
        with:
          registry: registry.rapidfort.com
          username: ${{ secrets.RAPIDFORT_USERNAME }}
          password: ${{ secrets.RAPIDFORT_PASSWORD }}

      # 3. Pull de l'image Rapidfort
      - name: Pull Rapidfort Image
        run: |
          docker pull registry.rapidfort.com/python:3.12
          docker tag registry.rapidfort.com/python:3.12 rapidfort-python:3.12

      # 4. Scan Trivy
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rapidfort-python:3.12
          format: json
          output: trivy-rapidfort-results.json
          severity: CRITICAL,HIGH,MEDIUM,LOW
          exit-code: '0'

      # 5. Résumé Trivy dans les logs
      - name: Display Trivy Summary
        run: |
          echo "=== TRIVY SCAN SUMMARY - RAPIDFORT ==="
          cat trivy-rapidfort-results.json | jq '
            .Results[] |
            {
              Target: .Target,
              Critical: [.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length,
              High: [.Vulnerabilities[]? | select(.Severity=="HIGH")] | length,
              Medium: [.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length,
              Low: [.Vulnerabilities[]? | select(.Severity=="LOW")] | length
            }
          '

      # 6. Upload rapport Trivy
      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-rapidfort-report
          path: trivy-rapidfort-results.json
          retention-days: 30

      # 7. Java 11 requis pour Cortex CLI
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      # 8. Installation Cortex CLI
      - name: Install Cortex CLI
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          export HOMEBREW_NO_REQUIRE_TAP_TRUST=1
          brew tap paloaltonetworks/cortexcli
          brew install cortexcli
          echo "$(brew --prefix)/bin" >> $GITHUB_PATH

      # 9. Scan Cortex sur l'image Rapidfort
      - name: Run Cortex Image Scan
        env:
          CORTEX_API_BASE_URL: ${{ secrets.CORTEX_API_BASE_URL }}
          CORTEX_API_KEY_ID: ${{ secrets.CORTEX_API_KEY_ID }}
          CORTEX_API_KEY: ${{ secrets.CORTEX_API_KEY }}
        run: |
          echo "=== CORTEX SCAN SUMMARY - RAPIDFORT ==="
          cortexcli image scan rapidfort-python:3.12 --soft-fail 2>&1 | tee cortex-rapidfort-results.txt

      # 10. Debug - Vérification output Cortex
      - name: Debug - Verify Cortex Output
        if: always()
        run: |
          echo "=== Taille du fichier ==="
          wc -l cortex-rapidfort-results.txt
          echo "=== Contenu ==="
          cat cortex-rapidfort-results.txt

      # 11. Upload rapport Cortex
      - name: Upload Cortex Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cortex-rapidfort-report
          path: cortex-rapidfort-results.txt
          if-no-files-found: warn
          retention-days: 30
