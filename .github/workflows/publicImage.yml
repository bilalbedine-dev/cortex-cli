name: POC - Docker Official Nginx Image Scan (Trivy + Cortex)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  scan-docker-nginx:
    name: Docker Official Nginx - Trivy & Cortex Scan
    runs-on: ubuntu-latest
    environment: cortex cli

    steps:
      # 1. Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Pull image Docker officielle nginx alpine3.21 (pas de login nécessaire)
      - name: Pull Docker Official Nginx Image
        run: |
          docker pull nginx:alpine3.21
          docker tag nginx:alpine3.21 docker-nginx:alpine3.21
          echo "=== Image vérification ==="
          docker images | grep docker-nginx

      # 3. Scan Trivy
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: docker-nginx:alpine3.21
          format: json
          output: trivy-docker-results.json
          severity: CRITICAL,HIGH,MEDIUM,LOW
          exit-code: '0'

      # 4. Résumé Trivy dans les logs
      - name: Display Trivy Summary
        run: |
          echo "=== TRIVY SCAN SUMMARY - DOCKER nginx ==="
          cat trivy-docker-results.json | jq '
            .Results[] |
            {
              Target: .Target,
              Critical: [.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length,
              High: [.Vulnerabilities[]? | select(.Severity=="HIGH")] | length,
              Medium: [.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length,
              Low: [.Vulnerabilities[]? | select(.Severity=="LOW")] | length
            }
          '

      # 5. Upload rapport Trivy
      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-docker-nginx-report
          path: trivy-docker-results.json
          retention-days: 30

      # 6. Java 11 requis pour Cortex CLI
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      # 7. Installation Cortex CLI
      - name: Install Cortex CLI
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          export HOMEBREW_NO_REQUIRE_TAP_TRUST=1
          brew tap paloaltonetworks/cortexcli
          brew install cortexcli
          echo "$(brew --prefix)/bin" >> $GITHUB_PATH

      # 8. Scan Cortex
      - name: Run Cortex Image Scan
        env:
          CORTEX_API_BASE_URL: ${{ secrets.CORTEX_API_BASE_URL }}
          CORTEX_API_KEY_ID: ${{ secrets.CORTEX_API_KEY_ID }}
          CORTEX_API_KEY: ${{ secrets.CORTEX_API_KEY }}
        run: |
          echo "=== CORTEX SCAN SUMMARY - DOCKER nginx ==="
          cortexcli image scan docker-nginx:alpine3.21 --soft-fail 2>&1 | tee cortex-docker-results.txt

      # 9. Upload rapport Cortex
      - name: Upload Cortex Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cortex-docker-nginx-report
          path: cortex-docker-results.txt
          if-no-files-found: warn
          retention-days: 30
